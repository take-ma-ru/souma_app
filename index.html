<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>簿記1級 × Jett</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="簿記道場">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06060f">
<meta name="description" content="Jettと学ぶ簿記1級RPG学習アプリ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --p:#00d4d8;--pd:#009fa3;--pg:rgba(0,212,216,0.3);
  --bg:#06060f;--bg2:#0e0e22;--bg3:#161630;
  --card:#1a1a35;--card2:#22224a;
  --tx:#e8e8ff;--tx2:#8888aa;
  --err:#ff3355;--ok:#00ff88;--gold:#ffd700;
  --boss:#cc44ff;
  --fs-xs:13px;--fs-sm:15px;--fs-md:17px;--fs-lg:20px;--fs-xl:24px;--fs-xxl:30px;
}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:16px;}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* TITLE */
#s-title{background:linear-gradient(180deg,#06060f,#0d0d28,#06060f);align-items:center;justify-content:center;position:relative;overflow:hidden;}
.grid-bg{position:absolute;width:100%;height:100%;background:repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,216,0.04) 39px,rgba(0,212,216,0.04) 40px),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,216,0.04) 39px,rgba(0,212,216,0.04) 40px);}
.title-content{z-index:1;text-align:center;padding:40px 24px;width:100%;}
.jett-img{width:200px;height:200px;object-fit:contain;object-position:top;filter:drop-shadow(0 0 20px var(--pg));margin:0 auto 24px;display:block;}
.title-logo{font-size:var(--fs-xxl);font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--p),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.title-sub{font-size:var(--fs-sm);color:var(--tx2);margin-bottom:36px;letter-spacing:1px;}
.jett-quote{background:var(--card);border-left:3px solid var(--p);padding:14px 18px;border-radius:0 8px 8px 0;margin:0 16px 32px;font-size:var(--fs-md);color:var(--p);font-style:italic;line-height:1.6;}
.btn{border:none;padding:18px 40px;font-size:var(--fs-md);font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-primary{background:var(--p);color:#000;box-shadow:0 0 20px var(--pg);animation:glow 2s infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--pg);}50%{box-shadow:0 0 40px var(--pg),0 0 60px var(--pg);}}

/* HEADER */
.hdr{display:flex;align-items:center;padding:16px 16px 12px;gap:12px;background:var(--bg);border-bottom:1px solid var(--bg3);position:sticky;top:0;z-index:10;}
.hdr-back{background:var(--card);border:none;color:var(--p);padding:10px 16px;border-radius:6px;cursor:pointer;font-size:var(--fs-sm);}
.hdr-title{font-size:var(--fs-md);font-weight:700;flex:1;}
.hdr-progress{font-size:var(--fs-xs);color:var(--tx2);}

/* WORLD MAP */
.wm-hero{padding:20px;text-align:center;}
.wm-title{font-size:var(--fs-xl);font-weight:900;margin-bottom:6px;}
.wm-sub{font-size:var(--fs-sm);color:var(--tx2);margin-bottom:16px;}
.overall-bar{background:var(--card);border-radius:4px;height:10px;overflow:hidden;margin-bottom:6px;}
.overall-bar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--pd));border-radius:4px;transition:width .5s;}
.overall-pct{font-size:var(--fs-sm);color:var(--tx2);}
.cat-grid{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cat-card{background:var(--card);border-radius:12px;padding:20px 14px;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative;overflow:hidden;}
.cat-card.cleared{border-color:var(--p);}
.cat-emoji{font-size:36px;margin-bottom:10px;}
.cat-name{font-size:var(--fs-md);font-weight:700;margin-bottom:6px;}
.cat-boss{font-size:var(--fs-xs);color:var(--tx2);margin-bottom:10px;}
.cat-bar{background:var(--bg2);border-radius:2px;height:5px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
.cat-pct{font-size:var(--fs-xs);color:var(--tx2);margin-top:5px;}
.cleared-badge{position:absolute;top:8px;right:8px;background:var(--p);color:#000;font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px;}
.boss-badge{position:absolute;top:8px;right:8px;background:var(--boss);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px;}

/* STAGE MAP */
.stage-list{padding:12px;flex:1;}
.section-card{background:var(--card);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.section-hdr{padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.section-icon{font-size:24px;}
.section-name{font-size:var(--fs-md);font-weight:700;flex:1;}
.section-status{font-size:var(--fs-xs);color:var(--tx2);}
.section-status.cleared{color:var(--p);}
.item-list{border-top:1px solid var(--bg2);}
.item-row{padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;border-bottom:1px solid var(--bg2);}
.item-row:last-child{border-bottom:none;}
.item-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg2);flex-shrink:0;}
.item-icon.done{background:rgba(0,212,216,0.2);}
.item-name{font-size:var(--fs-md);flex:1;}
.item-arrow{color:var(--tx2);font-size:18px;}
.boss-row{padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;background:rgba(204,68,255,0.1);border-top:1px solid rgba(204,68,255,0.3);}
.boss-row-icon{font-size:28px;}
.boss-row-name{font-size:var(--fs-md);font-weight:700;color:var(--boss);flex:1;}
.boss-row-status{font-size:var(--fs-xs);color:var(--tx2);}

/* STUDY */
.study-body{flex:1;padding:20px;overflow-y:auto;}
.study-char{display:flex;align-items:flex-end;gap:12px;margin-bottom:18px;}
.study-bubble{background:var(--card);border-radius:12px 12px 12px 0;padding:14px 16px;font-size:var(--fs-md);color:var(--p);max-width:82%;line-height:1.6;border:1px solid var(--pg);}
.study-jett{width:54px;height:54px;object-fit:contain;object-position:top;flex-shrink:0;}
.study-section-title{font-size:var(--fs-xl);font-weight:900;margin-bottom:8px;}
.study-section-sub{font-size:var(--fs-sm);color:var(--tx2);margin-bottom:20px;}
.study-content{font-size:var(--fs-md);line-height:1.85;color:var(--tx);}
.study-content h3{font-size:var(--fs-lg);font-weight:700;color:var(--p);margin:18px 0 10px;}
.study-content p{margin-bottom:14px;}
.study-content .formula{background:var(--card);border:1px solid var(--pg);border-radius:8px;padding:14px;font-family:monospace;font-size:var(--fs-sm);color:var(--p);margin:12px 0;line-height:1.8;}
.study-content .point{background:rgba(0,212,216,0.1);border-left:3px solid var(--p);padding:12px 14px;border-radius:0 6px 6px 0;margin:12px 0;font-size:var(--fs-sm);line-height:1.7;}
.study-footer{padding:20px;border-top:1px solid var(--bg3);}
.btn-full{width:100%;padding:18px;font-size:var(--fs-md);font-weight:700;border-radius:10px;cursor:pointer;border:none;background:var(--p);color:#000;}

/* QUIZ */
.quiz-body{flex:1;padding:20px;display:flex;flex-direction:column;}
.quiz-progress{display:flex;gap:4px;margin-bottom:20px;}
.quiz-dot{flex:1;height:5px;border-radius:3px;background:var(--card2);}
.quiz-dot.done{background:var(--p);}
.quiz-dot.current{background:var(--pd);}
.quiz-enemy{text-align:center;margin-bottom:16px;}
.quiz-enemy-icon{font-size:52px;}
.quiz-enemy-name{font-size:var(--fs-sm);color:var(--tx2);margin-top:6px;}
.quiz-bubble{background:var(--card);border-radius:0 12px 12px 12px;padding:14px 16px;font-size:var(--fs-sm);color:#ff9944;margin-bottom:18px;border:1px solid rgba(255,153,68,0.3);line-height:1.6;}
.quiz-q{font-size:var(--fs-md);font-weight:600;line-height:1.7;margin-bottom:20px;flex:1;}
.quiz-choices{display:grid;gap:12px;}
.choice-btn{background:var(--card);border:2px solid var(--card2);padding:16px 18px;border-radius:10px;cursor:pointer;font-size:var(--fs-md);color:var(--tx);text-align:left;transition:all .15s;line-height:1.5;}
.choice-btn.selected-correct{border-color:var(--ok);background:rgba(0,255,136,0.15);color:var(--ok);}
.choice-btn.selected-wrong{border-color:var(--err);background:rgba(255,51,85,0.15);color:var(--err);}
.choice-btn.show-correct{border-color:var(--ok);background:rgba(0,255,136,0.1);}
.choice-btn:disabled{cursor:default;}
.quiz-feedback{padding:14px 16px;border-radius:10px;margin-top:14px;font-size:var(--fs-md);display:none;line-height:1.6;}
.quiz-feedback.correct{background:rgba(0,255,136,0.15);border:1px solid var(--ok);color:var(--ok);display:block;}
.quiz-feedback.wrong{background:rgba(255,51,85,0.15);border:1px solid var(--err);color:var(--err);display:block;}
.quiz-jett-msg{font-size:var(--fs-sm);color:var(--p);margin-top:10px;font-style:italic;}
.quiz-next-btn{margin-top:18px;width:100%;padding:16px;background:var(--p);color:#000;border:none;border-radius:10px;font-size:var(--fs-md);font-weight:700;cursor:pointer;display:none;}

/* RESULT */
.result-body{flex:1;padding:30px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.result-score{font-size:72px;font-weight:900;}
.result-score.pass{color:var(--ok);text-shadow:0 0 30px var(--ok);}
.result-score.fail{color:var(--err);text-shadow:0 0 30px var(--err);}
.result-label{font-size:var(--fs-lg);font-weight:700;margin:10px 0 6px;}
.result-sub{font-size:var(--fs-md);color:var(--tx2);margin-bottom:24px;}
.result-jett{font-size:var(--fs-md);color:var(--p);background:var(--card);border:1px solid var(--pg);padding:16px 18px;border-radius:12px;margin:0 0 24px;line-height:1.6;}
.result-btns{display:grid;gap:12px;width:100%;}

/* BATTLE */
#s-battle{background:#000;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.battle-bg{position:absolute;width:100%;height:100%;background:radial-gradient(circle at center,#1a0030,#000 70%);}
.battle-content{z-index:1;text-align:center;padding:40px 24px;width:100%;}
.battle-enemy{font-size:88px;margin-bottom:16px;display:block;}
.battle-enemy-name{font-size:var(--fs-lg);color:#ff9944;margin-bottom:24px;}
.battle-enemy-quote{font-size:var(--fs-md);color:#ffcc88;background:rgba(255,153,68,0.15);border:1px solid rgba(255,153,68,0.3);padding:14px;border-radius:10px;margin-bottom:32px;line-height:1.6;}
.battle-jett{width:130px;height:130px;object-fit:contain;object-position:top;filter:drop-shadow(0 0 20px var(--pg));display:block;margin:0 auto 16px;}
.battle-jett-quote{font-size:var(--fs-md);color:var(--p);margin-top:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp .4s ease;}

/* BOSS */
.boss-hdr{padding:20px;}
.boss-title{font-size:var(--fs-sm);color:var(--boss);margin-bottom:10px;font-weight:700;letter-spacing:1px;}
.hp-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.hp-label{font-size:var(--fs-sm);color:var(--tx2);width:32px;}
.hp-bar{flex:1;height:12px;background:var(--card2);border-radius:6px;overflow:hidden;}
.hp-fill{height:100%;border-radius:6px;transition:width .4s ease;}
.hp-fill.boss-hp{background:linear-gradient(90deg,var(--err),var(--boss));}
.hp-fill.jett-hp{background:linear-gradient(90deg,var(--p),var(--ok));}
.boss-enemy{text-align:center;padding:16px 20px;}
.boss-icon{font-size:80px;margin-bottom:10px;}
.boss-name{font-size:var(--fs-lg);font-weight:900;color:var(--boss);margin-bottom:6px;}
.boss-quote-bubble{background:rgba(204,68,255,0.15);border:1px solid rgba(204,68,255,0.4);border-radius:12px;padding:14px 18px;font-size:var(--fs-sm);color:#cc88ff;margin:0 16px 14px;line-height:1.6;}
.jett-boss-bubble{background:rgba(0,212,216,0.15);border:1px solid var(--pg);border-radius:12px;padding:14px 18px;font-size:var(--fs-sm);color:var(--p);margin:0 16px 18px;line-height:1.6;}
.boss-quiz{padding:0 16px 20px;}
.boss-q{font-size:var(--fs-md);font-weight:600;line-height:1.7;margin-bottom:18px;}
.boss-choices{display:grid;gap:10px;}

/* BOSS WIN */
#s-bosswin{background:#000;align-items:center;justify-content:center;text-align:center;overflow:hidden;position:relative;}
.bosswin-content{z-index:1;padding:40px 24px;}
.bosswin-stars{font-size:52px;letter-spacing:4px;margin-bottom:20px;}
.bosswin-title{font-size:var(--fs-xxl);font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--gold);margin-bottom:10px;}
.bosswin-jett{width:150px;height:150px;object-fit:contain;object-position:top;display:block;margin:20px auto;filter:drop-shadow(0 0 30px var(--pg));}
.bosswin-quote{font-size:var(--fs-md);color:var(--p);background:var(--card);border:1px solid var(--pg);padding:18px;border-radius:12px;margin:0 0 24px;line-height:1.7;}

/* PROGRESS */
.prog-body{padding:20px;flex:1;overflow-y:auto;}
.prog-header{text-align:center;margin-bottom:24px;}
.prog-jett{width:110px;height:110px;object-fit:contain;object-position:top;display:block;margin:0 auto 14px;filter:drop-shadow(0 0 15px var(--pg));}
.prog-name{font-size:var(--fs-xl);font-weight:900;}
.prog-total{font-size:var(--fs-sm);color:var(--tx2);}
.prog-cat-list{display:grid;gap:14px;}
.prog-cat{background:var(--card);border-radius:10px;padding:18px;}
.prog-cat-name{font-size:var(--fs-md);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.prog-bar{background:var(--bg2);border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px;}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.prog-pct{font-size:var(--fs-sm);color:var(--tx2);}
.review-section{margin-top:20px;}
.review-title{font-size:var(--fs-md);font-weight:700;color:var(--err);margin-bottom:12px;}
.review-item{background:var(--card);border-radius:8px;padding:14px;margin-bottom:10px;font-size:var(--fs-sm);border-left:3px solid var(--err);line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <div id="s-title" class="screen active"></div>
  <div id="s-world" class="screen"></div>
  <div id="s-stage" class="screen"></div>
  <div id="s-study" class="screen"></div>
  <div id="s-quiz" class="screen"></div>
  <div id="s-battle" class="screen"></div>
  <div id="s-boss" class="screen"></div>
  <div id="s-bosswin" class="screen"></div>
  <div id="s-result" class="screen"></div>
  <div id="s-progress" class="screen"></div>
</div>
<script>
'use strict';

// Jett画像パス（同一フォルダ内）
var JETT_IMG = 'jett.jpg';

// ゲームデータ
var GD = {
  categories: [
    {
      id:'comm', name:'商業簿記', emoji:'📘', color:'#4488ff',
      boss:{name:'商売の鬼', icon:'👹',
        appear:'…よう来たな。商業簿記をなめとったら、痛い目みるで',
        jettAppear:'商売の鬼…ここが正念場たい。行くよ',
        die:'…負けた。まあ、ええ根性しとるわ',
        jettWin:'強かったばい。でも、私の方が上やったたい'},
      sections:[
        {id:'cash', name:'現金・預金', icon:'💴',
          boss:{name:'現金・預金の亡者', icon:'👻',
            appear:'現金管理もできんくせに、よう来たな',
            jettAppear:'現金・預金…基本中の基本たい。絶対負けんよ',
            die:'…なんでや。完璧に守っとったのに',
            jettWin:'基本をなめたらいかんばい'},
          items:[
            {id:'cash1', name:'小口現金制度',
              content:'<h3>小口現金制度とは</h3><p>日常的な少額の支払いを処理するための制度。会計係が小口現金係に一定額の資金を前渡しし、支払いの都度記録を行う。</p><h3>定額資金前渡制度（インプレスト・システム）</h3><p>最も一般的な方式。一定額を常に保持し、使った分だけ補給する方式。</p><div class="formula">補給額 = 支払合計額<br>残高 = 小口現金限度額 - 支払合計額</div><div class="point">ポイント：小口現金出納帳の締め切りは月末・補給時の両方で行う</div>',
              questions:[
                {type:'4択', q:'定額資金前渡制度において小口現金の補給額はどれか？', choices:['小口現金限度額 - 残高','支払合計額','小口現金限度額 ÷ 月数','受取合計額 - 支払合計額'], answer:1, explain:'補給額は実際に支払った合計額に等しい。残高を限度額に戻す補給を行う。'},
                {type:'○×', q:'小口現金出納帳の締め切りは、月末にしか行えない。', choices:['○（正しい）','×（誤り）'], answer:1, explain:'月末だけでなく、補給時にも締め切りを行うことができる。'},
              ]
            },
            {id:'cash2', name:'銀行勘定調整表',
              content:'<h3>銀行勘定調整表とは</h3><p>企業の当座預金帳簿残高と銀行の残高証明書残高の不一致を解明する表。</p><div class="point">①未取付小切手：振り出したが銀行未処理<br>②未渡小切手：作成したが未渡し<br>③未取立小切手：取立依頼中<br>④振込未通知：入金されたが未通知</div><div class="formula">【銀行残高】<br>+ 未取立小切手<br>- 未取付小切手<br>= 正しい残高<br><br>【帳簿残高】<br>+ 振込未通知<br>- 未渡小切手<br>= 正しい残高</div>',
              questions:[
                {type:'4択', q:'企業が小切手を振り出したが銀行でまだ処理されていない場合の名称は？', choices:['未取立小切手','未取付小切手','未渡小切手','不渡小切手'], answer:1, explain:'振り出し済みで銀行未処理の小切手を「未取付小切手」という。銀行残高から控除して調整する。'},
                {type:'○×', q:'未渡小切手は、帳簿残高に加算して調整する。', choices:['○（正しい）','×（誤り）'], answer:0, explain:'未渡小切手は振り出し処理済みだが未渡し。帳簿残高に加算して調整する。'},
              ]
            },
          ]
        },
        {id:'ar', name:'売掛・買掛金', icon:'🧾',
          boss:{name:'売掛・買掛の番人', icon:'🛡️',
            appear:'売掛金と買掛金の違い、ちゃんと分かっとるんか？',
            jettAppear:'当然たい。かかってきんね',
            die:'…うそやろ、完璧に覚えとるやんか',
            jettWin:'片付けたばい。次行くよ'},
          items:[
            {id:'ar1', name:'売掛金・買掛金の基礎',
              content:'<h3>売掛金と買掛金</h3><p>売掛金：商品を販売し、代金を後日受け取る権利（資産）<br>買掛金：商品を仕入れ、代金を後日支払う義務（負債）</p><h3>貸倒引当金</h3><p>売掛金の回収不能見込額を引当金として計上。</p><div class="formula">貸倒引当金繰入 = 期末売掛金 × 貸倒実績率</div>',

// --- STATE ---
var STORAGE_KEY = 'boki1_v2';
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"progress":{},"review":[]}'); }
  catch(e) { return {progress:{}, review:[]}; }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({progress: ST.progress, review: ST.reviewList})); }
  catch(e) {}
}

var saved = loadData();
var ST = {
  screen: 'title',
  catId: null, secId: null, itemId: null,
  bossKey: null, bossFight: null,
  quiz: null,
  progress: saved.progress,
  reviewList: saved.review
};

function getProgress(id) { return ST.progress[id] || {cleared: false}; }
function setCleared(id) { ST.progress[id] = {cleared: true}; saveData(); }
function addWrong(q) { if (!ST.reviewList.includes(q)) ST.reviewList.push(q); saveData(); }

function getCatProgress(cat) {
  var total = 0, done = 0;
  cat.sections.forEach(function(s) {
    s.items.forEach(function(i) { total++; if(getProgress(i.id).cleared) done++; });
    if(getProgress(s.id + '_boss').cleared) { total++; done++; }
  });
  if(getProgress(cat.id + '_boss').cleared) { total++; done++; }
  return {total: total, done: done, pct: total ? Math.round(done/total*100) : 0};
}

function getTotalProgress() {
  var total = 0, done = 0;
  GD.categories.forEach(function(c) { var p = getCatProgress(c); total += p.total; done += p.done; });
  return {total: total, done: done, pct: total ? Math.round(done/total*100) : 0};
}

// --- NAVIGATION ---
function gotoScreen(screen) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var el = document.getElementById('s-' + screen);
  if(el) { el.classList.add('active'); el.scrollTop = 0; }
  ST.screen = screen;
  renderScreen(screen);
}

function renderScreen(screen) {
  var map = {
    title: renderTitle, world: renderWorld, stage: renderStage,
    study: renderStudy, quiz: renderQuiz, battle: renderBattle,
    boss: renderBoss,
    progress: renderProgress
  };
  if(map[screen]) map[screen]();
}

  });
  var catBossBtn = document.getElementById('btnCatBoss');
  if(catBossBtn) catBossBtn.addEventListener('click', function() { startBoss(null, cat.id + '_boss'); });
}

function renderStudy() {
  var cat = GD.categories.find(function(c) { return c.id === ST.catId; });
  var sec = cat && cat.sections.find(function(s) { return s.id === ST.secId; });
  var item = sec && sec.items.find(function(i) { return i.id === ST.itemId; });
  if(!item) return;
  document.getElementById('s-study').innerHTML =
    '<div class="hdr"><button class="hdr-back" id="btnBackStage">← 戻る</button>' +
    '<div class="hdr-title">学習</div></div>' +
    '<div class="study-body">' +
    '<div class="study-char">' +
    '<img src="' + JETT_IMG + '" class="study-jett" alt="Jett">' +
    '<div class="study-bubble">「まずは知ることからたい。しっかり覚えんね」</div></div>' +
    '<div class="study-section-title">' + item.name + '</div>' +
    '<div class="study-section-sub">' + sec.name + ' › ' + cat.name + '</div>' +
    '<div class="study-content">' + item.content + '</div></div>' +
    '<div class="study-footer"><button class="btn-full" id="btnToTest">理解した！テストへ ⚔️</button></div>';
  document.getElementById('btnBackStage').addEventListener('click', function() { gotoScreen('stage'); });
  document.getElementById('btnToTest').addEventListener('click', function() { startQuiz(); });
}

function startQuiz() {
  var cat = GD.categories.find(function(c) { return c.id === ST.catId; });
  var sec = cat && cat.sections.find(function(s) { return s.id === ST.secId; });
  var item = sec && sec.items.find(function(i) { return i.id === ST.itemId; });
  if(!item) return;
  ST.quiz = {idx: 0, answers: [], questions: item.questions, itemId: item.id, answered: false};
  gotoScreen('quiz');
}

function renderQuiz() {
  var q = ST.quiz;
  if(!q || !q.questions) return;
  var current = q.questions[q.idx];
  var cat = GD.categories.find(function(c) { return c.id === ST.catId; });
  var sec = cat && cat.sections.find(function(s) { return s.id === ST.secId; });
  var enemy = (sec && sec.boss) || {icon:'👺', name:'雑魚敵'};
  var dots = q.questions.map(function(_, i) {
    return '<div class="quiz-dot' + (i < q.idx ? ' done' : i === q.idx ? ' current' : '') + '"></div>';
  }).join('');
  var choices = current.choices.map(function(c, i) {
    return '<button class="choice-btn" data-idx="' + i + '">' + String.fromCharCode(65+i) + '. ' + c + '</button>';
  }).join('');
  document.getElementById('s-quiz').innerHTML =
    '<div class="hdr"><button class="hdr-back" id="btnBackStudy">← 戻る</button>' +
    '<div class="hdr-title">テスト ' + (q.idx+1) + '/' + q.questions.length + '</div></div>' +
    '<div class="quiz-body">' +
    '<div class="quiz-progress">' + dots + '</div>' +
    '<div class="quiz-enemy"><div class="quiz-enemy-icon">' + enemy.icon + '</div>' +
    '<div class="quiz-enemy-name">' + enemy.name + '</div></div>' +
    '<div class="quiz-bubble">「ここは通さへんで〜！」</div>' +
    '<div class="quiz-q">' + current.q + '</div>' +
    '<div class="quiz-choices" id="quizChoices">' + choices + '</div>' +
    '<div class="quiz-feedback" id="quizFeedback"></div>' +
    '<button class="quiz-next-btn" id="quizNext">次へ ›</button></div>';
  document.getElementById('btnBackStudy').addEventListener('click', function() { gotoScreen('study'); });
  document.querySelectorAll('.choice-btn[data-idx]').forEach(function(btn) {
    btn.addEventListener('click', function() { checkAnswer(parseInt(this.dataset.idx)); });
  });
  document.getElementById('quizNext').addEventListener('click', function() { nextQuestion(); });
}

function checkAnswer(chosen) {
  var q = ST.quiz;
  if(q.answered) return;
  q.answered = true;
  var current = q.questions[q.idx];
  var isCorrect = chosen === current.answer;
  q.answers.push({chosen: chosen, correct: isCorrect});
  if(!isCorrect) addWrong(current.q);
  document.querySelectorAll('.choice-btn').forEach(function(btn, i) {
    btn.disabled = true;
    if(i === current.answer) btn.classList.add('show-correct');
    if(i === chosen && !isCorrect) btn.classList.add('selected-wrong');
    if(i === chosen && isCorrect) btn.classList.add('selected-correct');
  });
  var fb = document.getElementById('quizFeedback');
  fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '✓ 正解！' : '✗ 不正解') +
    '<div class="quiz-jett-msg">' + (isCorrect ? '「完璧たい。私が認めてあげる」' : '「惜しかばい…もう一回たい」') + '</div>' +
    '<div style="font-size:15px;color:#aaa;margin-top:8px;line-height:1.6">' + current.explain + '</div>';
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuestion() {
  var q = ST.quiz;
  q.idx++;
  q.answered = false;
  if(q.idx >= q.questions.length) { showResult(); }
  else { renderQuiz(); }
}

function showResult() {
  var q = ST.quiz;
  var correct = q.answers.filter(function(a) { return a.correct; }).length;
  var total = q.answers.length;
  var pct = Math.round(correct / total * 100);
  var pass = pct >= 80;
  if(pass) setCleared(q.itemId);
  document.getElementById('s-result').innerHTML =
    '<div class="hdr"><div class="hdr-title">テスト結果</div></div>' +
    '<div class="result-body">' +
    '<div class="result-score ' + (pass ? 'pass' : 'fail') + '">' + pct + '%</div>' +
    '<div class="result-label">' + (pass ? '🎉 合格！' : '😢 不合格') + '</div>' +
    '<div class="result-sub">' + correct + '/' + total + '問正解（合格ライン: 80%）</div>' +
    '<div class="result-jett">' + (pass ? '「完璧たい。私が認めてあげる」' : '「…もう一回ばい。諦めるとは早かよ」') + '</div>' +
    '<div class="result-btns">' +
    (pass ? '<button id="btnBattle" class="btn btn-primary" style="width:100%;padding:14px">⚔️ バトルへ！</button>'
           : '<button id="btnRetry" class="btn btn-primary" style="width:100%;padding:14px">🔄 再挑戦</button>') +
    '<button id="btnBackToStage" style="width:100%;padding:16px;background:var(--card);border:none;color:var(--tx);border-radius:10px;cursor:pointer;font-size:17px">← ステージに戻る</button>' +
    '</div></div>';
  gotoScreen('result');
  var bb = document.getElementById('btnBattle');
  if(bb) bb.addEventListener('click', function() { gotoScreen('battle'); renderBattle(); });
  var br = document.getElementById('btnRetry');
  if(br) br.addEventListener('click', function() { startQuiz(); });
  document.getElementById('btnBackToStage').addEventListener('click', function() { gotoScreen('stage'); });
}

function renderBattle() {
  var cat = GD.categories.find(function(c) { return c.id === ST.catId; });
  var sec = cat && cat.sections.find(function(s) { return s.id === ST.secId; });
  var enemy = (sec && sec.boss) || {icon:'👺', name:'雑魚敵'};
  document.getElementById('s-battle').innerHTML =
    '<div class="battle-bg"></div>' +
    '<div class="battle-content">' +
    '<div id="battleEnemy" style="font-size:80px;margin-bottom:16px">' + enemy.icon + '</div>' +
    '<div style="font-size:16px;color:#ff9944;margin-bottom:24px">' + enemy.name + '</div>' +
    '<div id="enemyQ" style="font-size:17px;color:#ffcc88;background:rgba(255,153,68,.15);border:1px solid rgba(255,153,68,.3);padding:14px;border-radius:10px;margin-bottom:32px;line-height:1.6">「う、うそやろ…」</div>' +
    '<div style="font-size:24px;font-weight:900;color:#fff;margin-bottom:24px">VS</div>' +
    '<img src="' + JETT_IMG + '" class="battle-jett" alt="Jett">' +
    '<div id="battleSlash" style="font-size:60px;display:none">⚡</div>' +
    '<div id="jettQ" class="battle-jett-quote">「片付けたばい。次行くよ」</div>' +
    '<button id="btnNextStage" style="margin-top:24px;display:none;padding:18px 36px;background:var(--p);color:#000;border:none;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer">次のステージへ ›</button>' +
    '</div>';
  setTimeout(function() {
    var eq = document.getElementById('enemyQ');
    if(eq) eq.textContent = '「ボスに言いつけたるからな〜！」';
    var slash = document.getElementById('battleSlash');
    if(slash) slash.style.display = 'block';
    setTimeout(function() {
      if(slash) slash.style.display = 'none';
      var be = document.getElementById('battleEnemy');
      if(be) { be.style.transform = 'translateY(80px)'; be.style.opacity = '0'; be.style.transition = 'all .6s'; }
      setTimeout(function() {
        var nb = document.getElementById('btnNextStage');
        if(nb) { nb.style.display = 'block'; nb.addEventListener('click', function() { gotoScreen('stage'); }); }
      }, 700);
    }, 600);
  }, 1200);
}

function startBoss(secId, bossKey) {
  ST.secId = secId;
  ST.bossKey = bossKey;
  var boss, questions;
  if(bossKey === 'lassboss') {
    boss = GD.lassboss;
    questions = GD.lassboss.questions;
  } else {
    var catId = bossKey.replace('_boss','');
    var cat = GD.categories.find(function(c) { return c.id === catId; });
    if(cat && !secId) {
      boss = cat.boss;
      questions = [];
      cat.sections.forEach(function(s) { s.items.forEach(function(i) { i.questions.forEach(function(q) { questions.push(q); }); }); });
      questions = questions.slice(0, 5);
    } else if(cat && secId) {
      var sec = cat.sections.find(function(s) { return s.id === secId; });
      boss = sec && sec.boss;
      questions = [];
      if(sec) sec.items.forEach(function(i) { i.questions.forEach(function(q) { questions.push(q); }); });
    }
  }
  ST.bossFight = {boss: boss, bossKey: bossKey, questions: (questions||[]).slice(0,5), idx: 0, bossHP: 100, jettHP: 100, answered: false};
  gotoScreen('boss');
}

function renderBoss() {
  var bf = ST.bossFight;
  if(!bf || !bf.boss) return;
  var current = bf.questions[bf.idx];
  if(!current) { renderBossWin(bf.bossHP <= bf.jettHP); return; }
  var choices = current.choices.map(function(c, i) {
    return '<button class="choice-btn" data-bidx="' + i + '">' + String.fromCharCode(65+i) + '. ' + c + '</button>';
  }).join('');
  document.getElementById('s-boss').innerHTML =
    '<div class="boss-hdr">' +
    '<div class="boss-title">⚡ BOSS BATTLE — ' + (bf.idx+1) + '/' + bf.questions.length + '</div>' +
    '<div class="hp-bar-wrap"><div class="hp-label" style="color:var(--boss)">敵</div>' +
    '<div class="hp-bar"><div class="hp-fill boss-hp" id="bossHPFill" style="width:' + bf.bossHP + '%"></div></div>' +
    '<div style="font-size:15px;color:var(--tx2)">' + bf.bossHP + '</div></div>' +
    '<div class="hp-bar-wrap"><div class="hp-label" style="color:var(--p)">Jett</div>' +
    '<div class="hp-bar"><div class="hp-fill jett-hp" id="jettHPFill" style="width:' + bf.jettHP + '%"></div></div>' +
    '<div style="font-size:15px;color:var(--tx2)">' + bf.jettHP + '</div></div></div>' +
    '<div class="boss-enemy">' +
    '<div class="boss-icon">' + bf.boss.icon + '</div>' +
    '<div class="boss-name">' + bf.boss.name + '</div></div>' +
    '<div class="boss-quote-bubble" id="bossBubble">' + (bf.idx===0 ? bf.boss.appear : '「まだ終わらへんで！」') + '</div>' +
    '<div class="jett-boss-bubble" id="jettBossBubble">' + (bf.idx===0 ? (bf.boss.jettAppear||'「行くよ！」') : '「止まらんよ！」') + '</div>' +
    '<div class="boss-quiz"><div class="boss-q">' + current.q + '</div>' +
    '<div class="boss-choices" id="bossChoices">' + choices + '</div>' +
    '<div class="quiz-feedback" id="bossFeedback"></div>' +
    '<button class="quiz-next-btn" id="bossNext">次の問題 ›</button></div>';
  document.querySelectorAll('.choice-btn[data-bidx]').forEach(function(btn) {
    btn.addEventListener('click', function() { bossAnswer(parseInt(this.dataset.bidx)); });
  });
  document.getElementById('bossNext').addEventListener('click', function() { nextBossQ(); });
}

function bossAnswer(chosen) {
  var bf = ST.bossFight;
  if(bf.answered) return;
  bf.answered = true;
  var current = bf.questions[bf.idx];
  var isCorrect = chosen === current.answer;
  document.querySelectorAll('.choice-btn').forEach(function(btn, i) {
    btn.disabled = true;
    if(i === current.answer) btn.classList.add('show-correct');
    if(i === chosen && !isCorrect) btn.classList.add('selected-wrong');
    if(i === chosen && isCorrect) btn.classList.add('selected-correct');
  });
  if(isCorrect) {
    bf.bossHP = Math.max(0, bf.bossHP - 20);
    var bh = document.getElementById('bossHPFill');
    if(bh) bh.style.width = bf.bossHP + '%';
    var bb = document.getElementById('bossBubble');
    if(bb) bb.textContent = '「ちょ、ちょっと待ってや…」';
    var jb = document.getElementById('jettBossBubble');
    if(jb) jb.textContent = '「止まらんよ。これが私のスピードたい」';
  } else {
    bf.jettHP = Math.max(0, bf.jettHP - 20);
    addWrong(current.q);
    var jh = document.getElementById('jettHPFill');
    if(jh) jh.style.width = bf.jettHP + '%';
    var bb2 = document.getElementById('bossBubble');
    if(bb2) bb2.textContent = '「やったー！もう一回や！」';
    var jb2 = document.getElementById('jettBossBubble');
    if(jb2) jb2.textContent = '「…くっ。まだたい、諦めんよ」';
  }
  var fb = document.getElementById('bossFeedback');
  fb.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = (isCorrect ? '✓ 正解！' : '✗ 不正解') +
    '<div style="font-size:15px;color:#aaa;margin-top:6px;line-height:1.6">' + current.explain + '</div>';
  document.getElementById('bossNext').style.display = 'block';
}

function nextBossQ() {
  var bf = ST.bossFight;
  bf.idx++;
  bf.answered = false;
  if(bf.bossHP <= 0 || bf.idx >= bf.questions.length) {
    var won = bf.bossHP <= bf.jettHP || bf.bossHP === 0;
    if(won) setCleared(bf.bossKey);
    ST.bossFight.lastWon = won;
    renderBossWin(won);
    gotoScreen('bosswin');
  } else {
    renderBoss();
  }
}

function renderBossWin(won) {
  var bf = ST.bossFight;
  if(won === undefined && bf) won = bf.lastWon;
  if(won === undefined) won = true;
  document.getElementById('s-bosswin').innerHTML =
    '<div class="battle-bg"></div>' +
    '<div class="bosswin-content">' +
    '<div class="bosswin-stars">' + (won ? '★★★' : '☆☆☆') + '</div>' +
    '<div class="bosswin-title">' + (won ? 'BOSS撃破！' : '敗北…') + '</div>' +
    '<img src="' + JETT_IMG + '" class="bosswin-jett" alt="Jett">' +
    '<div class="bosswin-quote">' + (won ? ((bf && bf.boss && bf.boss.jettWin) || '「制圧完了たい！」') : '「…もう一回ばい。諦めるとは早かよ」') + '</div>' +
    (!won ? '<div style="font-size:16px;color:var(--tx2);margin-bottom:18px">再挑戦して敵を倒せ！</div>' : '') +
    '<button id="bossWinBtn" style="width:100%;max-width:320px;padding:18px;background:var(--p);color:#000;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer">' +
    (won ? 'ワールドマップへ ›' : '再挑戦 ↺') + '</button></div>';
  var btn = document.getElementById('bossWinBtn');
  if(btn) {
    btn.addEventListener('click', function() {
      if(won) { gotoScreen('world'); }
      else { startBoss(ST.secId, ST.bossKey); }
    });
  }
}

function renderProgress() {
  var tp = getTotalProgress();
  var h = '<div class="hdr"><button class="hdr-back" id="btnBackWorldP">← 戻る</button>' +
    '<div class="hdr-title">📊 進捗・実績</div></div>' +
    '<div class="prog-body">' +
    '<div class="prog-header">' +
    '<img src="' + JETT_IMG + '" class="prog-jett" alt="Jett">' +
    '<div class="prog-name">JETT 簿記記録</div>' +
    '<div class="prog-total">全体進捗: ' + tp.done + '/' + tp.total + ' (' + tp.pct + '%)</div></div>' +
    '<div class="prog-cat-list">';
  GD.categories.forEach(function(cat) {
    var p = getCatProgress(cat);
    h += '<div class="prog-cat">' +
      '<div class="prog-cat-name">' + cat.emoji + ' ' + cat.name +
      (getProgress(cat.id+'_boss').cleared ? '<span style="color:var(--p);font-size:13px;margin-left:6px">✓ボス撃破</span>' : '') + '</div>' +
      '<div class="prog-bar"><div class="prog-bar-fill" style="width:' + p.pct + '%;background:' + cat.color + '"></div></div>' +
      '<div class="prog-pct">' + p.done + '/' + p.total + ' (' + p.pct + '%)</div></div>';
  });
  h += '</div>';
  if(ST.reviewList.length > 0) {
    h += '<div class="review-section"><div class="review-title">📝 復習リスト（' + ST.reviewList.length + '問）</div>';
    ST.reviewList.slice(-5).forEach(function(q) {
      h += '<div class="review-item">' + q + '</div>';
    });
    h += '<button id="btnClearReview" style="background:none;border:1px solid var(--err);color:var(--err);padding:12px 20px;border-radius:6px;cursor:pointer;font-size:15px;margin-top:10px">リストをクリア</button>';
    h += '</div>';
  }
  h += '</div>';
  document.getElementById('s-progress').innerHTML = h;
  document.getElementById('btnBackWorldP').addEventListener('click', function() { gotoScreen('world'); });
  var cr = document.getElementById('btnClearReview');
  if(cr) cr.addEventListener('click', function() { ST.reviewList = []; saveData(); renderProgress(); });
}

// 起動
renderTitle();
gotoScreen('title');
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) { console.log('SW registered'); })
      .catch(function(err) { console.log('SW error:', err); });
  });
}
</script>
