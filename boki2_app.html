<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>簿記2級 × Jett バトル道場</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="簿記2級道場">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06060f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{
  --p:#00d4d8;--pg:rgba(0,212,216,0.3);
  --bg:#06060f;--bg2:#0e0e22;--bg3:#161630;
  --card:#1a1a35;--card2:#22224a;
  --tx:#e8e8ff;--tx2:#8888aa;
  --err:#ff3355;--ok:#00ff88;--gold:#ffd700;
  --combo:#ff9900;
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--tx);font-size:16px;}
#app{max-width:480px;margin:0 auto;height:100%;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100%;}
.screen.active{display:flex;}

/* ===== TITLE ===== */
#s-title{background:linear-gradient(180deg,#06060f,#0a0a20,#06060f);align-items:center;justify-content:center;position:relative;overflow-y:auto;}
.grid-bg{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,212,216,0.04) 40px),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,212,216,0.04) 40px);}
.radial-glow{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,216,0.12) 0%,transparent 70%);animation:pulse-glow 3s ease-in-out infinite;}
@keyframes pulse-glow{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}}
.title-content{z-index:1;text-align:center;padding:24px 24px 32px;width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;}

/* Jett floating */
.jett-wrap{position:relative;width:180px;height:190px;margin:0 auto;}
.jett-img{width:180px;height:180px;object-fit:contain;object-position:top;filter:drop-shadow(0 0 24px var(--pg));animation:jett-float 3s ease-in-out infinite;display:block;}
@keyframes jett-float{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-14px) rotate(1.5deg);}}
.wind-line{position:absolute;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--p),transparent);animation:wind-move 2s ease-in-out infinite;}
.wind-line:nth-child(2){width:50px;top:55%;left:-8px;animation-delay:0s;}
.wind-line:nth-child(3){width:34px;top:38%;right:-6px;animation-delay:1s;animation-direction:reverse;}
@keyframes wind-move{0%{opacity:0;transform:translateX(-8px);}50%{opacity:1;}100%{opacity:0;transform:translateX(28px);}}

.title-logo{font-size:28px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--p),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.title-sub{font-size:13px;color:var(--tx2);letter-spacing:4px;margin-top:-6px;}
.jett-quote{background:var(--card);border-left:3px solid var(--p);padding:12px 16px;border-radius:0 8px 8px 0;font-size:14px;color:var(--p);font-style:italic;line-height:1.6;align-self:stretch;margin:0 4px;text-align:left;}
.title-credit{font-size:25px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.6);white-space:nowrap;}

/* buttons */
.btn{border:none;padding:16px 32px;font-size:16px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:1px;transition:all .18s;width:100%;max-width:300px;}
.btn-primary{background:var(--p);color:#000;box-shadow:0 0 20px var(--pg);animation:glow 2s infinite;}
.btn-primary:active{transform:scale(.96);}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--pg);}50%{box-shadow:0 0 40px var(--pg),0 0 60px var(--pg);}}
.btn-secondary{background:var(--card);color:var(--p);border:1px solid var(--pg);}
.btn-secondary:active{transform:scale(.96);}

/* ===== STAGE SELECT SCREEN ===== */
#s-stages{background:linear-gradient(180deg,#06060f,#0a0a20,#06060f);position:relative;overflow:hidden;}
.stages-hdr{display:flex;align-items:center;padding:14px 16px;background:rgba(0,0,0,.5);border-bottom:1px solid var(--bg3);flex-shrink:0;gap:10px;}
.stages-hdr-title{font-size:15px;font-weight:700;color:var(--p);letter-spacing:2px;flex:1;}
.stages-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.stages-body h3{font-size:11px;color:var(--tx2);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;text-align:center;}
.stages-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stage-card{background:var(--card);border:1px solid rgba(0,212,216,.25);border-radius:10px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .15s;position:relative;}
.stage-card:active{transform:scale(.96);background:var(--card2);}
.stage-card.cleared{border-color:var(--p);}
.stage-card.cleared::after{content:"✓";position:absolute;top:6px;right:8px;color:var(--p);font-size:11px;font-weight:700;}
.sc-emoji{font-size:28px;display:block;margin-bottom:4px;}
.sc-name{font-size:11px;color:var(--tx);line-height:1.3;font-weight:600;}
.sc-count{font-size:10px;color:var(--tx2);margin-top:2px;}

/* ===== BATTLE ===== */
#s-battle{background:linear-gradient(180deg,#06060f 0%,#090918 100%);}

.battle-hdr{display:flex;align-items:center;padding:10px 14px 8px;gap:10px;background:rgba(0,0,0,.5);border-bottom:1px solid var(--bg3);flex-shrink:0;}
.battle-hdr-title{font-size:13px;font-weight:700;color:var(--p);letter-spacing:1px;flex:1;}
.battle-hdr-progress{font-size:12px;color:var(--tx2);}
.btn-quit{background:transparent;color:#ff4d6d;border:1px solid #ff4d6d55;border-radius:8px;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:.5px;transition:background .15s;}
.btn-quit:active{background:#ff4d6d22;}
.combo-badge{background:var(--combo);color:#000;font-size:11px;font-weight:900;padding:3px 8px;border-radius:10px;display:none;letter-spacing:1px;}
.combo-badge.show{display:block;animation:badge-pop .35s cubic-bezier(.36,.07,.19,.97);}
.combo-badge.show.mega{font-size:15px;padding:5px 12px;background:linear-gradient(135deg,#ff6600,#ff0099);color:#fff;box-shadow:0 0 16px #ff0099,0 0 32px #ff6600;animation:badge-mega .4s cubic-bezier(.36,.07,.19,.97);}
@keyframes badge-pop{0%{transform:scale(0) rotate(-15deg);}60%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
@keyframes badge-mega{0%{transform:scale(0) rotate(-20deg);}50%{transform:scale(1.5) rotate(8deg);}75%{transform:scale(0.9) rotate(-3deg);}100%{transform:scale(1) rotate(0);}}

/* Arena */
.arena{display:flex;align-items:flex-end;padding:8px 14px 4px;gap:10px;flex-shrink:0;position:relative;}
.jett-side,.enemy-side{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}

.hp-row{width:100%;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2);}
.hp-bar{flex:1;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;box-shadow:0 0 6px rgba(0,0,0,.5);}
.hp-fill{height:100%;border-radius:5px;transition:width .35s cubic-bezier(.4,0,.2,1);}
.hp-fill.jett-hp{background:linear-gradient(90deg,#00b4d8,#4ee1e1);box-shadow:0 0 8px #00d4d8;}
.hp-fill.enemy-hp{background:linear-gradient(90deg,#ff1a3a,#ff6b6b);box-shadow:0 0 8px #ff3355;}
.hp-fill.danger{background:linear-gradient(90deg,#ff6600,#ff0000);animation:hp-danger .6s ease-in-out infinite alternate;}
@keyframes hp-danger{0%{opacity:.8;}100%{opacity:1;box-shadow:0 0 14px #ff0000;}}
.hp-num{font-size:10px;color:var(--tx2);min-width:24px;text-align:right;}

/* Characters */
.char-box{position:relative;height:120px;display:flex;align-items:flex-end;justify-content:center;}
.jett-battle{height:112px;width:auto;object-fit:contain;object-position:top;filter:drop-shadow(0 0 14px rgba(0,212,216,.6));animation:b-idle 2.2s ease-in-out infinite;transform-origin:bottom center;}
@keyframes b-idle{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-7px) rotate(1deg);}}

/* Jett attack — dash forward + slash */
.jett-battle.do-attack{animation:j-attack .55s cubic-bezier(.2,0,.8,1) forwards;}
@keyframes j-attack{
  0%  {transform:translateX(0) scale(1);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
  20% {transform:translateX(10px) scale(1.05) scaleY(.92);filter:drop-shadow(0 0 30px #00ffff);}
  45% {transform:translateX(70px) scale(1.15) scaleY(.88);filter:drop-shadow(0 0 40px #00ffff) brightness(1.4);}
  65% {transform:translateX(72px) scale(1.1);filter:drop-shadow(0 0 50px #ffffff) brightness(2);}
  100%{transform:translateX(0) scale(1);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
}
/* Jett crit attack */
.jett-battle.do-crit{animation:j-crit .6s cubic-bezier(.2,0,.8,1) forwards;}
@keyframes j-crit{
  0%  {transform:translateX(0) scale(1) rotate(0deg);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
  15% {transform:translateX(5px) scale(1.1) rotate(-8deg);filter:drop-shadow(0 0 30px #ffff00) brightness(1.5);}
  40% {transform:translateX(80px) scale(1.25) rotate(10deg);filter:drop-shadow(0 0 60px #ffffff) brightness(3);}
  60% {transform:translateX(82px) scale(1.2) rotate(5deg);filter:drop-shadow(0 0 80px #00ffff) brightness(3);}
  100%{transform:translateX(0) scale(1) rotate(0deg);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
}
/* Jett damaged */
.jett-battle.do-dmg{animation:j-dmg .5s ease-out forwards;}
@keyframes j-dmg{
  0%  {transform:translateX(0);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
  20% {transform:translateX(-16px) scale(.95);filter:drop-shadow(0 0 24px rgba(255,51,85,1)) brightness(2);}
  45% {transform:translateX(-20px) scale(.93);filter:drop-shadow(0 0 30px rgba(255,0,0,1)) brightness(2.5);}
  70% {transform:translateX(-8px);}
  100%{transform:translateX(0);filter:drop-shadow(0 0 14px rgba(0,212,216,.6));}
}

/* Slash effects — multiple lines for flair */
.slash-fx{position:absolute;right:-8px;top:40%;width:0;height:0;opacity:0;pointer-events:none;}
.slash-line{position:absolute;height:3px;border-radius:2px;transform-origin:left center;}
.slash-fx.go .slash-line:nth-child(1){background:linear-gradient(90deg,transparent,#00ffff,#fff);width:80px;top:0;animation:sl1 .38s ease-out forwards;}
.slash-fx.go .slash-line:nth-child(2){background:linear-gradient(90deg,transparent,#00d4d8);width:55px;top:-10px;animation:sl2 .38s .04s ease-out forwards;transform:rotate(-20deg);}
.slash-fx.go .slash-line:nth-child(3){background:linear-gradient(90deg,transparent,#88ffff);width:40px;top:12px;animation:sl3 .38s .06s ease-out forwards;transform:rotate(15deg);}
@keyframes sl1{0%{opacity:0;transform:scaleX(0);}25%{opacity:1;transform:scaleX(1);}100%{opacity:0;transform:scaleX(1.5) translateX(20px);}}
@keyframes sl2{0%{opacity:0;transform:rotate(-20deg) scaleX(0);}25%{opacity:.8;transform:rotate(-20deg) scaleX(1);}100%{opacity:0;transform:rotate(-20deg) scaleX(1.4) translateX(16px);}}
@keyframes sl3{0%{opacity:0;transform:rotate(15deg) scaleX(0);}25%{opacity:.6;transform:rotate(15deg) scaleX(1);}100%{opacity:0;transform:rotate(15deg) scaleX(1.3) translateX(12px);}}

/* Crit slash — extra thick + gold */
.slash-fx.crit .slash-line:nth-child(1){background:linear-gradient(90deg,transparent,#ffd700,#fff);height:5px;width:100px;}
.slash-fx.crit .slash-line:nth-child(2){background:linear-gradient(90deg,transparent,#ffaa00);height:4px;width:70px;}

/* Explosion on enemy hit */
.hit-burst{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;opacity:0;pointer-events:none;}
.hit-burst.go{animation:burst .45s ease-out forwards;}
.hit-burst.crit-burst{width:120px;height:120px;animation:burst-crit .5s ease-out forwards;}
@keyframes burst{0%{opacity:.9;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,#fff 0%,#00ffff 40%,transparent 70%);}60%{opacity:.4;transform:translate(-50%,-50%) scale(1.5);}100%{opacity:0;transform:translate(-50%,-50%) scale(2);}}
@keyframes burst-crit{0%{opacity:1;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,#fff 0%,#ffd700 30%,#ff6600 55%,transparent 75%);}50%{opacity:.6;transform:translate(-50%,-50%) scale(2);}100%{opacity:0;transform:translate(-50%,-50%) scale(3);}}

.enemy-char{display:flex;flex-direction:column;align-items:center;animation:e-idle 2.5s ease-in-out infinite;cursor:default;position:relative;z-index:1;}
@keyframes e-idle{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(5deg);}}
.enemy-icon-el{font-size:58px;line-height:1;transition:transform .2s;}
.enemy-name-el{font-size:10px;color:#ff6b6b;font-weight:700;letter-spacing:1px;margin-top:4px;}
.enemy-char.do-hit{animation:e-hit .45s ease-out forwards;}
@keyframes e-hit{
  0%  {transform:translateX(0) rotate(0deg) scale(1);filter:none;}
  20% {transform:translateX(22px) rotate(8deg) scale(.9);filter:brightness(3) saturate(0);}
  40% {transform:translateX(26px) rotate(-6deg) scale(.85);filter:brightness(2) saturate(0) blur(1px);}
  70% {transform:translateX(10px) rotate(2deg) scale(.95);filter:brightness(1.3);}
  100%{transform:translateX(0) rotate(0deg) scale(1);filter:none;}
}
.enemy-char.do-crit-hit{animation:e-crit-hit .55s ease-out forwards;}
@keyframes e-crit-hit{
  0%  {transform:scale(1) rotate(0deg);filter:none;}
  15% {transform:scale(.7) rotate(15deg) translateX(30px);filter:brightness(5) saturate(0);}
  35% {transform:scale(.6) rotate(-10deg) translateX(35px);filter:brightness(4) saturate(0) blur(2px);}
  60% {transform:scale(.8) rotate(5deg) translateX(15px);filter:brightness(2);}
  100%{transform:scale(1) rotate(0deg) translateX(0);filter:none;}
}

/* Damage number pop */
.dmg-pop{position:absolute;top:-10px;right:-10px;font-size:28px;font-weight:900;color:#ff3355;text-shadow:0 0 12px rgba(255,51,85,.9),0 2px 0 #000;opacity:0;pointer-events:none;z-index:10;}
.dmg-pop.go{animation:dmg-anim 1s cubic-bezier(.2,0,.8,1) forwards;}
.dmg-pop.crit-pop{font-size:36px;color:#ffd700;text-shadow:0 0 20px #ff6600,0 0 40px #ffaa00,0 2px 0 #000;}
.dmg-pop.crit-pop.go{animation:dmg-crit 1.1s cubic-bezier(.2,0,.8,1) forwards;}
@keyframes dmg-anim{0%{opacity:1;transform:translateY(0) scale(.4) rotate(-10deg);}25%{opacity:1;transform:translateY(-22px) scale(1.3) rotate(5deg);}100%{opacity:0;transform:translateY(-50px) scale(.8) rotate(-5deg);}}
@keyframes dmg-crit{0%{opacity:1;transform:translateY(0) scale(0) rotate(-20deg);}20%{opacity:1;transform:translateY(-10px) scale(1.8) rotate(10deg);}45%{transform:translateY(-28px) scale(1.4) rotate(-5deg);}100%{opacity:0;transform:translateY(-65px) scale(.7) rotate(0deg);}}

/* CRITICAL text overlay */
.crit-text{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);font-size:22px;font-weight:900;color:#ffd700;text-shadow:0 0 20px #ff6600,0 0 40px #fff;letter-spacing:4px;white-space:nowrap;pointer-events:none;z-index:20;opacity:0;}
.crit-text.go{animation:crit-txt .8s cubic-bezier(.36,.07,.19,.97) forwards;}
@keyframes crit-txt{0%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(-10deg);}25%{opacity:1;transform:translate(-50%,-50%) scale(1.4) rotate(3deg);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1) rotate(-1deg);}75%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(1deg);}100%{opacity:0;transform:translate(-50%,-60%) scale(1) rotate(0deg);}}

/* Enemy danger state */
.enemy-char.danger .enemy-icon-el{animation:e-danger .4s ease-in-out infinite alternate;}
@keyframes e-danger{0%{filter:brightness(1);}100%{filter:brightness(1.5) drop-shadow(0 0 8px #ff3355);}}

/* Message */
.msg-box{margin:0 12px 4px;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.5;border:1px solid;text-align:center;display:none;flex-shrink:0;}
.msg-box.ok{background:rgba(0,255,136,.1);border-color:var(--ok);color:var(--ok);box-shadow:0 0 12px rgba(0,255,136,.2);}
.msg-box.ng{background:rgba(255,51,85,.1);border-color:var(--err);color:var(--err);box-shadow:0 0 12px rgba(255,51,85,.2);}
.msg-box.ok{animation:msg-slide .25s ease-out;}
.msg-box.ng{animation:msg-slide .25s ease-out;}
@keyframes msg-slide{0%{opacity:0;transform:translateY(6px);}100%{opacity:1;transform:translateY(0);}}

/* Question area */
.q-area{flex:1;display:flex;flex-direction:column;padding:0 12px 12px;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.q-box{background:var(--card);border:1px solid rgba(0,212,216,.2);border-radius:12px;padding:12px 14px;flex-shrink:0;}
.q-label{font-size:11px;color:var(--p);font-weight:700;letter-spacing:2px;margin-bottom:6px;}
.q-text{font-size:14px;line-height:1.65;color:var(--tx);}
.choices{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
.choice{background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--tx);font-size:13px;padding:12px 13px;cursor:pointer;text-align:left;line-height:1.5;transition:all .15s;display:flex;gap:9px;align-items:flex-start;}
.choice:active{transform:scale(.97);background:var(--card2);}
.choice-label{background:rgba(0,212,216,.18);border-radius:5px;padding:2px 7px;font-weight:700;font-size:11px;color:var(--p);flex-shrink:0;margin-top:1px;}
.choice.correct{background:rgba(0,255,136,.12);border-color:var(--ok);color:var(--ok);box-shadow:0 0 10px rgba(0,255,136,.2);animation:choice-ok .3s ease-out;}
.choice.wrong{background:rgba(255,51,85,.12);border-color:var(--err);color:var(--err);}
.choice.disabled{pointer-events:none;opacity:.55;}
@keyframes choice-ok{0%{transform:scale(.97);}60%{transform:scale(1.03);}100%{transform:scale(1);}}

/* Screen FX — shake */
#s-battle.screen-shake{animation:s-shake .55s ease-out;}
@keyframes s-shake{0%,100%{transform:translateX(0);}10%{transform:translateX(-14px) rotate(-1deg);}25%{transform:translateX(14px) rotate(1deg);}40%{transform:translateX(-10px) rotate(-.5deg);}55%{transform:translateX(8px) rotate(.5deg);}70%{transform:translateX(-5px);}85%{transform:translateX(3px);}}
#s-battle.screen-flash-blue{animation:s-flash-blue .3s ease-out;}
@keyframes s-flash-blue{0%,100%{background-color:transparent;}40%{background-color:rgba(0,212,216,.1);}}
#s-battle.screen-flash-gold{animation:s-flash-gold .4s ease-out;}
@keyframes s-flash-gold{0%,100%{background-color:transparent;}30%{background-color:rgba(255,215,0,.1);}}

/* ===== FULL-SCREEN OVERLAY ===== */
#screen-overlay{
  position:fixed;inset:0;z-index:999;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
}
/* 正解：緑フラッシュ */
#screen-overlay.ok-flash{animation:ov-ok .6s ease-out forwards;}
@keyframes ov-ok{
  0%  {opacity:0;background:radial-gradient(ellipse at center,rgba(0,255,136,.55) 0%,rgba(0,255,136,.25) 50%,transparent 75%);}
  15% {opacity:1;background:radial-gradient(ellipse at center,rgba(0,255,136,.7) 0%,rgba(0,255,136,.35) 50%,transparent 75%);}
  50% {opacity:.6;background:radial-gradient(ellipse at center,rgba(0,255,136,.3) 0%,rgba(0,255,136,.12) 50%,transparent 75%);}
  100%{opacity:0;background:transparent;}
}
/* 不正解：赤フラッシュ */
#screen-overlay.ng-flash{animation:ov-ng .65s ease-out forwards;}
@keyframes ov-ng{
  0%  {opacity:0;background:rgba(255,30,60,0);}
  10% {opacity:1;background:rgba(255,30,60,.45);}
  30% {opacity:.9;background:rgba(255,30,60,.3);}
  70% {opacity:.4;background:rgba(255,30,60,.12);}
  100%{opacity:0;background:transparent;}
}
/* クリティカル：金フラッシュ */
#screen-overlay.crit-flash{animation:ov-crit .7s ease-out forwards;}
@keyframes ov-crit{
  0%  {opacity:0;background:radial-gradient(ellipse at center,rgba(255,255,255,.9) 0%,rgba(255,215,0,.6) 35%,rgba(255,100,0,.2) 65%,transparent 80%);}
  10% {opacity:1;}
  40% {opacity:.7;background:radial-gradient(ellipse at center,rgba(255,220,0,.4) 0%,rgba(255,100,0,.15) 50%,transparent 80%);}
  100%{opacity:0;background:transparent;}
}
/* 正解テキスト */
#screen-overlay .ov-label{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:52px;font-weight:900;letter-spacing:6px;white-space:nowrap;
  text-shadow:0 0 30px currentColor,0 2px 0 rgba(0,0,0,.5);
  pointer-events:none;
}
#screen-overlay.ok-flash .ov-label{
  content:'';color:#00ff88;
  animation:ov-label-ok .6s cubic-bezier(.36,.07,.19,.97) forwards;
}
#screen-overlay.ng-flash .ov-label{
  color:#ff3355;
  animation:ov-label-ng .65s cubic-bezier(.36,.07,.19,.97) forwards;
}
#screen-overlay.crit-flash .ov-label{
  color:#ffd700;
  animation:ov-label-ok .7s cubic-bezier(.36,.07,.19,.97) forwards;
}
@keyframes ov-label-ok{
  0%  {transform:translate(-50%,-50%) scale(0) rotate(-5deg);opacity:0;}
  25% {transform:translate(-50%,-50%) scale(1.3) rotate(2deg);opacity:1;}
  55% {transform:translate(-50%,-50%) scale(1.1) rotate(-1deg);opacity:1;}
  100%{transform:translate(-50%,-55%) scale(.9) rotate(0deg);opacity:0;}
}
@keyframes ov-label-ng{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0;}
  20% {transform:translate(-50%,-50%) scale(1.2) rotate(3deg);opacity:1;}
  50% {transform:translate(-50%,-50%) scale(1.05) rotate(-1deg);opacity:1;}
  100%{transform:translate(-50%,-55%) scale(.95);opacity:0;}
}
/* 光のビームライン（正解時） */
#screen-overlay.ok-flash::before,
#screen-overlay.crit-flash::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(70deg,transparent 0%,transparent 8%,rgba(255,255,255,.04) 8%,rgba(255,255,255,.04) 9%);
  animation:beam-sweep .6s ease-out forwards;
}
@keyframes beam-sweep{0%{opacity:0;transform:translateX(-10%);}50%{opacity:1;}100%{opacity:0;transform:translateX(5%);}}
/* 赤ビネット（不正解時） */
#screen-overlay.ng-flash::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(180,0,0,.5) 100%);
  animation:vignette-ng .65s ease-out forwards;
}
@keyframes vignette-ng{0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}}

/* ===== INTER RESULT (ラウンド間) ===== */
#s-inter{background:linear-gradient(160deg,#06060f,#0a0a24);align-items:center;justify-content:center;}
.inter-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 24px;width:100%;max-width:360px;}
.inter-round-badge{font-size:11px;color:var(--tx2);letter-spacing:3px;text-transform:uppercase;}
.inter-icon{font-size:52px;}
.inter-title{font-size:22px;font-weight:900;color:var(--p);letter-spacing:2px;}
.inter-stats{background:var(--card);border:1px solid rgba(0,212,216,.2);border-radius:12px;padding:14px 20px;width:100%;font-size:14px;line-height:2.2;}
.inter-stats .val{color:var(--p);font-weight:700;}
.inter-stats .val.bad{color:var(--err);}
.inter-next-info{font-size:13px;color:var(--tx2);text-align:center;}

/* ===== RESULT ===== */
#s-result{background:linear-gradient(160deg,#06060f,#0a0a24);align-items:center;justify-content:center;}
.result-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:32px 24px;width:100%;max-width:360px;}
.result-icon{font-size:64px;animation:r-bounce .6s cubic-bezier(.36,.07,.19,.97);}
@keyframes r-bounce{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
.result-title{font-size:26px;font-weight:900;color:var(--p);text-align:center;letter-spacing:2px;}
.result-msg{font-size:14px;color:var(--tx2);text-align:center;line-height:1.7;}
.result-stats{background:var(--card);border:1px solid rgba(0,212,216,.2);border-radius:12px;padding:16px 24px;width:100%;font-size:14px;line-height:2.2;}
.result-stats .val{color:var(--p);font-weight:700;}
.result-stats .val.bad{color:var(--err);}
.result-jett{width:120px;height:120px;object-fit:contain;object-position:top;filter:drop-shadow(0 0 16px var(--pg));animation:jett-float 3s ease-in-out infinite;}
.btn-group{display:flex;flex-direction:column;gap:8px;width:100%;align-items:center;}

/* ===== MUTE BUTTON ===== */
#mute-btn{
  position:fixed;bottom:16px;right:16px;z-index:1000;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(0,0,0,.6);color:#fff;font-size:20px;

  box-shadow:0 2px 8px rgba(0,0,0,.5);backdrop-filter:blur(4px);
  transition:background .2s,transform .15s;
}
#mute-btn:active{transform:scale(.9);}
#mute-btn.muted{background:rgba(255,51,85,.4);}
</style>
</head>

<script>

const STAGES = [
  {

        {q:'小口現金200円の補給。内訳：交通費120円、消耗品費80円。補給は当座預金から。正しい仕訳は？',cs:['借方：小口現金200　貸方：当座預金200','借方：交通費120・消耗品費80　貸方：小口現金200','借方：交通費120・消耗品費80　貸方：当座預金200','借方：現金200　貸方：当座預金200'],a:2,ex:'補給時に経費を計上し、資金源の当座預金を貸方に記入する。'},
        {q:'当座預金口座で当座借越50万円が発生した。この時の仕訳（当座借越勘定使用）は？',cs:['借方：当座預金50万　貸方：当座借越50万','借方：当座借越50万　貸方：当座預金50万','借方：当座預金50万　貸方：借入金50万','仕訳不要'],a:0,ex:'当座借越勘定に振り替える場合、当座預金（借方）・当座借越（貸方）とする。'},

        {q:'決算時に原因不明の現金超過2,000円が残った。決算整理仕訳は？',cs:['借方：雑損2,000　貸方：現金過不足2,000','借方：現金過不足2,000　貸方：雑益2,000','借方：現金2,000　貸方：雑益2,000','仕訳不要'],a:1,ex:'決算時に超過が残れば雑益（収益）として処理する。'},

// =============================================
// HELPERS
// =============================================
function $(id){return document.getElementById(id);}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function triggerAnim(el,cls,after){
  el.classList.remove(cls);
  void el.offsetWidth;
  el.classList.add(cls);
  el.addEventListener('animationend',()=>{el.classList.remove(cls);if(after)after();},{once:true});
}

// =============================================
// TITLE
// =============================================
function initTitle(){
  show('s-title');
}

$('btn-start').addEventListener('click',()=>{
  showStages();
});

// =============================================
// STAGE SELECT
// =============================================
function showStages(){
  BGM.play('stages');
  show('s-stages');
  renderStages();
}

function renderStages(){
  const grid=$('stages-grid');
  grid.innerHTML='';
  const cleared=JSON.parse(localStorage.getItem('boki2_cleared')||'[]');
  STAGES.forEach((s,i)=>{
    const totalQ=s.rounds.reduce((acc,r)=>acc+r.length,0);
    const d=document.createElement('div');
    d.className='stage-card'+(cleared.includes(s.id)?' cleared':'');
    d.innerHTML=`<span class="sc-emoji">${s.emoji}</span><div class="sc-name">${s.name}</div><div class="sc-count">${totalQ}問 / ${s.rounds.length}ラウンド</div>`;
    d.addEventListener('click',()=>startStage(i));
    grid.appendChild(d);
  });
}

function startStage(i){
  const s=STAGES[i];
  gs.stageIdx=i; gs.stage=s;
  gs.round=0; gs.qi=0;
  gs.jHP=gs.jMax=5;
  const totalQ=s.rounds.reduce((acc,r)=>acc+r.length,0);
  gs.eHP=gs.eMax=totalQ;
  gs.correct=0; gs.wrong=0;
  gs.rCorrect=0; gs.rWrong=0;
  gs.combo=0; gs.maxCombo=0;
  gs.busy=false;

  $('b-stage-name').textContent=s.name;
  $('enemy-icon').textContent=s.eIcon;
  $('enemy-name-el').textContent=s.eName;
  $('enemy-hp-label').textContent=s.eName;
  $('combo-badge').classList.remove('show','mega');
  $('enemy-char').classList.remove('danger');
  $('enemy-hp-bar').classList.remove('danger');
  $('jett-hp-bar').classList.remove('danger');

  BGM.playStage(i);
  updateHPBars();
  show('s-battle');
  nextQ();
}

function totalQCount(){
  return gs.stage.rounds.reduce((acc,r)=>acc+r.length,0);
}

function globalQIndex(){
  let idx=0;
  for(let r=0;r<gs.round;r++) idx+=gs.stage.rounds[r].length;
  idx+=gs.qi;
  return idx;
}

function updateHPBars(){
  const jp=Math.max(0,(gs.jHP/gs.jMax)*100);
  const ep=Math.max(0,(gs.eHP/gs.eMax)*100);
  $('jett-hp-bar').style.width=jp+'%';
  $('enemy-hp-bar').style.width=ep+'%';
  $('jett-hp-num').textContent=gs.jHP+'/'+gs.jMax;
  $('enemy-hp-num').textContent=gs.eHP+'/'+gs.eMax;
  const gIdx=globalQIndex();
  const total=totalQCount();
  $('b-progress').textContent=`R${gs.round+1} ${gs.qi+1}/${gs.stage.rounds[gs.round].length}問 (計${gIdx+1}/${total})`;
}

function nextQ(){
  const q=gs.stage.rounds[gs.round][gs.qi];
  $('q-text').textContent=q.q;
  $('msg-box').style.display='none';
  const ch=$('choices');
  ch.innerHTML='';
  const labels=['A','B','C','D'];
  q.cs.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="choice-label">${labels[i]}</span>${c}`;
    btn.addEventListener('click',()=>onAnswer(i,q));
    ch.appendChild(btn);
  });
  gs.busy=false;
}

function onAnswer(chosen,q){
  if(gs.busy)return;
  gs.busy=true;
  const btns=document.querySelectorAll('.choice');
  btns.forEach(b=>b.classList.add('disabled'));
  const ok=chosen===q.a;

  if(ok){
    gs.correct++; gs.rCorrect++;
    gs.combo++; gs.maxCombo=Math.max(gs.maxCombo,gs.combo);
    btns[chosen].classList.add('correct');
    doAttack();
    gs.eHP=Math.max(0,gs.eHP-1);
    updateHPBars();
    showCombo();
    showMsg('✅ 正解！  '+q.ex,true);
    const isCritSound=gs.combo>=3;
    triggerOverlay(isCritSound?'crit':'ok');
    if(isCritSound){ sfxCrit(); } else { sfxCorrect(); }
  } else {
    gs.wrong++; gs.rWrong++;
    gs.combo=0;
    btns[chosen].classList.add('wrong');
    btns[q.a].classList.add('correct');
    doDamage();
    gs.jHP=Math.max(0,gs.jHP-1);
    updateHPBars();
    $('combo-badge').classList.remove('show');
    showMsg('❌ 不正解…  '+q.ex,false);
    triggerOverlay('ng');
    sfxWrong();
  }

  setTimeout(()=>{
    gs.qi++;
    const roundQs=gs.stage.rounds[gs.round];
    if(gs.jHP<=0){
      showResult(false);
    } else if(gs.qi>=roundQs.length){
      // ラウンド終了
      const isLastRound=(gs.round>=gs.stage.rounds.length-1);
      if(isLastRound){
        showResult(true);
      } else {
        showInterResult();
      }
    } else {
      nextQ();
    }
  },2400);
}

function showCombo(){
  const badge=$('combo-badge');
  if(gs.combo>=2){
    $('combo-num').textContent=gs.combo;
    badge.classList.remove('show','mega');
    void badge.offsetWidth;
    badge.classList.add('show');
    if(gs.combo>=5) badge.classList.add('mega');
    sfxCombo(gs.combo);
  } else {
    badge.classList.remove('show','mega');
  }
}

// Jett attack → enemy hit
function doAttack(){
  const jett=$('jett-char');
  const slash=$('slash-fx');
  const enemy=$('enemy-char');
  const dmg=$('dmg-pop');
  const burst=$('hit-burst');
  const critText=$('crit-text');
  const isCrit=gs.combo>=3;
  const screen=$('s-battle');

  // Jettアニメ
  if(isCrit){
    triggerAnim(jett,'do-crit');
    slash.classList.add('crit');
  } else {
    triggerAnim(jett,'do-attack');
    slash.classList.remove('crit');
  }

  setTimeout(()=>{
    // 斬撃エフェクト
    triggerAnim(slash,'go');

    // 敵ダメージ
    if(isCrit){
      triggerAnim(enemy,'do-crit-hit');
    } else {
      triggerAnim(enemy,'do-hit');
    }

    // ダメージ数値
    dmg.className='dmg-pop'+(isCrit?' crit-pop':'');
    dmg.textContent=isCrit?'CRIT!!':'-1';
    void dmg.offsetWidth;
    dmg.classList.add('go');

    // バースト
    burst.className='hit-burst'+(isCrit?' crit-burst':'');
    void burst.offsetWidth;
    burst.classList.add('go');

    // CRITテキスト
    if(isCrit){
      triggerAnim(critText,'go');
      triggerAnim(screen,'screen-flash-gold');
    } else {
      triggerAnim(screen,'screen-flash-blue');
    }

    // 敵HP低下でdangerクラス
    const ep=gs.eHP/gs.eMax;
    if(ep<=0.3 && ep>0){
      enemy.classList.add('danger');
    } else {
      enemy.classList.remove('danger');
    }
    // HPバーdanger
    const ebar=$('enemy-hp-bar');
    if(ep<=0.3) ebar.classList.add('danger');
    else ebar.classList.remove('danger');

  },isCrit?220:280);
}

// Enemy attack → Jett damaged + screen shake
function doDamage(){
  const jett=$('jett-char');
  const screen=$('s-battle');
  triggerAnim(jett,'do-dmg');
  triggerAnim(screen,'screen-shake');
  triggerAnim(screen,'screen-flash-red');

  // JettのHPが低い時HPバーをdanger
  const jp=gs.jHP/gs.jMax;
  const jbar=$('jett-hp-bar');
  if(jp<=0.4) jbar.classList.add('danger');
  else jbar.classList.remove('danger');
}

function showMsg(text,ok){
  const box=$('msg-box');
  box.className='msg-box '+(ok?'ok':'ng');
  box.textContent=text;
  box.style.display='block';
}

// 全画面オーバーレイ＋振動
function triggerOverlay(type){
  const ov=$('screen-overlay');
  const label=$('ov-label');
  ov.className='';
  void ov.offsetWidth;
  if(type==='ok'){
    label.textContent='CORRECT!!';
    ov.classList.add('ok-flash');
    if(navigator.vibrate) navigator.vibrate([30,10,20]);
  } else if(type==='crit'){
    label.textContent='CRITICAL!!';
    ov.classList.add('crit-flash');
    if(navigator.vibrate) navigator.vibrate([20,10,40,10,60]);
  } else {
    label.textContent='MISS...';
    ov.classList.add('ng-flash');
    if(navigator.vibrate) navigator.vibrate([80,20,80]);
  }
}

// =============================================
// SOUND ENGINE (Web Audio API)
// =============================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;

function getACtx(){
  if(!actx) actx = new AudioCtx();
  // モバイルはユーザー操作後に resume が必要
  if(actx.state === 'suspended') actx.resume();
  return actx;
}

// 汎用：オシレーター＋エンベロープで音を鳴らす
function playTone({freq=440, type='sine', gain=0.4, attack=0.01, decay=0.1, sustain=0.0, release=0.15, duration=0.25, startTime=0}={}){
  const ctx = getACtx();
  const t = ctx.currentTime + startTime;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  // エンベロープ
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(gain, t + attack);
  env.gain.linearRampToValueAtTime(sustain * gain, t + attack + decay);
  env.gain.setValueAtTime(sustain * gain, t + duration - release);
  env.gain.linearRampToValueAtTime(0, t + duration);
  osc.start(t);
  osc.stop(t + duration);
}

// 周波数をスイープ
function playSwoop({freqStart=200, freqEnd=800, type='sawtooth', gain=0.3, duration=0.3, startTime=0}={}){
  const ctx = getACtx();
  const t = ctx.currentTime + startTime;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freqStart, t);
  osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
  env.gain.setValueAtTime(gain, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.01);
}

// ノイズバースト（打撃感）
function playNoise({gain=0.2, duration=0.08, startTime=0}={}){
  const ctx = getACtx();
  const t = ctx.currentTime + startTime;
  const bufLen = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufLen;i++) data[i] = (Math.random()*2-1);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const env = ctx.createGain();
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 800;
  filt.Q.value = 0.5;
  src.connect(filt);
  filt.connect(env);
  env.connect(ctx.destination);
  env.gain.setValueAtTime(gain, t);
  env.gain.exponentialRampToValueAtTime(0.001, t + duration);
  src.start(t);
  src.stop(t + duration + 0.01);
}

// CRIT音：派手な上昇＋ドカン
function sfxCrit(){
  // ドカン（ノイズ）
  playNoise({gain:0.35, duration:0.12, startTime:0});

  playSwoop({freqStart:150, freqEnd:1200, type:'sawtooth', gain:0.22, duration:0.3, startTime:0});
  // 高音チャイム連打
  [0, 0.08, 0.16, 0.26].forEach((st, i)=>{
    const freqs=[880, 1047, 1175, 1319];
    playTone({freq:freqs[i], type:'square', gain:0.18-i*0.02, attack:0.005, decay:0.06, sustain:0.0, release:0.1, duration:0.2, startTime:st});
  });
  // 最後に低音ドン
  playTone({freq:80, type:'sine', gain:0.5, attack:0.005, decay:0.25, sustain:0.0, release:0.05, duration:0.3, startTime:0.0});
}

// コンボ音：コンボ数に応じて音が高くなる
function sfxCombo(comboCount){
  const baseFreqs=[392,440,494,523,587,659,698,784];
  const freq = baseFreqs[Math.min(comboCount-2, baseFreqs.length-1)];
  playTone({freq, type:'square', gain:0.25, attack:0.005, decay:0.05, sustain:0.0, release:0.08, duration:0.18});
  playTone({freq:freq*1.5, type:'sine', gain:0.12, attack:0.01, decay:0.1, sustain:0.0, release:0.1, duration:0.2, startTime:0.02});
}

// =============================================
// INTER RESULT（ラウンド間）
// =============================================
function showInterResult(){
  const completedRound=gs.round+1;
  const totalRounds=gs.stage.rounds.length;
  const acc=gs.rCorrect+gs.rWrong>0?Math.round((gs.rCorrect/(gs.rCorrect+gs.rWrong))*100):0;

  $('ir-badge').textContent=`ROUND ${completedRound} / ${totalRounds} CLEAR`;
  $('ir-icon').textContent=gs.rCorrect===gs.stage.rounds[gs.round].length?'⚡':'💪';
  $('ir-title').textContent=`ラウンド${completedRound}クリア！`;
  $('ir-stats').innerHTML=
    `正解：<span class="val">${gs.rCorrect}</span> / ${gs.stage.rounds[gs.round].length}<br>`+
    `不正解：<span class="val bad">${gs.rWrong}</span><br>`+
    `正答率：<span class="val">${acc}%</span><br>`+
    `コンボ：<span class="val">${gs.maxCombo>=2?gs.maxCombo+'連続！':gs.maxCombo}</span>`;
  $('ir-next-info').textContent=`次はラウンド${completedRound+1}！残り${totalRounds-completedRound}ラウンド`;

  show('s-inter');
}

$('btn-next-round').addEventListener('click',()=>{
  gs.round++;
  gs.qi=0;
  gs.rCorrect=0;
  gs.rWrong=0;
  $('combo-badge').classList.remove('show');
  updateHPBars();
  show('s-battle');
  nextQ();
});

$('btn-inter-stages').addEventListener('click',()=>showStages());

$('btn-battle-quit').addEventListener('click',()=>{
  if(confirm('ステージ選択に戻りますか？\n（進行中のデータは失われます）')){
    showStages();
  }
});

// =============================================
// RESULT
// =============================================
function showResult(win){
  const total=totalQCount();
  const acc=Math.round((gs.correct/total)*100);
  if(win){
    const cleared=JSON.parse(localStorage.getItem('boki2_cleared')||'[]');
    if(!cleared.includes(gs.stage.id)){cleared.push(gs.stage.id);}
    localStorage.setItem('boki2_cleared',JSON.stringify(cleared));
  }

  $('r-icon').textContent=win?'🏆':'💀';
  $('r-title').textContent=win?'ステージクリア！':'ゲームオーバー…';
  $('r-msg').textContent=win
    ?`「${gs.stage.name}」をクリア！次のステージへ進め！`
    :`「${gs.stage.name}」でJettがやられてしまった…もう一度挑戦しよう！`;
  $('r-stats').innerHTML=
    `正解数：<span class="val">${gs.correct}</span> / ${total}<br>`+
    `不正解：<span class="val bad">${gs.wrong}</span><br>`+
    `正答率：<span class="val">${acc}%</span><br>`+
    `最大コンボ：<span class="val">${gs.maxCombo>=2?gs.maxCombo+'連続！':gs.maxCombo}</span>`;

  const rj=$('r-jett');
  rj.style.filter=win?'drop-shadow(0 0 20px rgba(255,215,0,.7))':'drop-shadow(0 0 20px rgba(255,51,85,.5)) grayscale(1)';

  BGM.stop();
  if(win){ sfxStageClear(); } else { sfxGameOver(); }

  show('s-result');
}

$('btn-retry').addEventListener('click',()=>startStage(gs.stageIdx));
$('btn-title').addEventListener('click',()=>showStages());

// =============================================
// MUTE
// =============================================
let muted = false;
const muteBtn = $('mute-btn');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  muteBtn.classList.toggle('muted', muted);
  if (actx) {
    // masterGainがあればそこで制御、なければactxのsuspend/resume
    actx.resume(); // suspendされてたら戻す
  }
  if (muted) {
    BGM.stop();
  } else {
    // 今いる画面に応じてBGMを再開
    const active = document.querySelector('.screen.active');
    if (active) {
      if (active.id === 's-title') BGM.play('title');
      else if (active.id === 's-stages') BGM.play('stages');
      else if (active.id === 's-battle') BGM.playStage(gs.stageIdx);
    }
  }
});

// BGMのplay/stopをミュート状態で制御するラッパー
const _bgmPlay = BGM.play.bind(BGM);
const _bgmPlayStage = BGM.playStage.bind(BGM);
BGM.play = (id) => { if (!muted) _bgmPlay(id); };
BGM.playStage = (i) => { if (!muted) _bgmPlayStage(i); };

// =============================================
// BOOT — 最初のタップ時にAudioContextを初期化（ブラウザの自動再生制限対策）
// BGM自体は各画面遷移時に呼ぶ。タイトル画面だけここで開始。
// =============================================
let bgmStarted = false;
function startBgmOnFirstTouch() {
  if (bgmStarted) return;
  bgmStarted = true;
  // 現在タイトル画面にいる場合だけタイトルBGMを再生
  // （ボタンタップ時はすでに画面遷移済みのためスキップされる）
  setTimeout(() => {
    const cur = document.querySelector('.screen.active');
    if (cur && cur.id === 's-title') BGM.play('title');
  }, 0);
}
document.addEventListener('touchstart', startBgmOnFirstTouch, {once: true});
document.addEventListener('click', startBgmOnFirstTouch, {once: true});

initTitle();

// =============================================
// SERVICE WORKER 登録
// =============================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
